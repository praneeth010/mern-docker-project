name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install Backend Dependencies
      - name: Install Backend
        run: |
          cd backend
          npm install

      # 4️⃣ Install Frontend Dependencies
      - name: Install Frontend
        run: |
          cd frontend
          npm install

      # 5️⃣ Build Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # 6️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7️⃣ Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 8️⃣ Build Docker Images
      - name: Build Docker Images
        run: docker compose build

      # 9️⃣ Debug: Check Images
      - name: Check Images
        run: docker images

      # 🔟 Tag Images (FIXED)
      - name: Tag Images
        run: |
          docker tag mern-backend ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
          docker tag mern-frontend ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest

      # 1️⃣1️⃣ Push Images
      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest

      # 1️⃣2️⃣ Run containers (optional test)
      - name: Run Containers
        run: docker compose up -d

      # 1️⃣3️⃣ Wait for services
      - name: Wait for containers
        run: sleep 15

      # 1️⃣4️⃣ Test Backend API
      - name: Test Backend
        run: curl http://localhost:5000/api

      # 1️⃣5️⃣ Test Frontend
      - name: Test Frontend
        run: curl http://localhost

      # 1️⃣6️⃣ Verify running containers
      - name: Check containers
        run: docker ps